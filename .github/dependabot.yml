# Dependabot keeps our pinned supply chain current.
# Scope note: the toolbox's Python tools (pip-audit, snyk-agent-scan) are pinned
# inline via Dockerfile ARGs + toolbox/tools.lock and tracked by
# scripts/check-tool-updates.sh, so there is no pip manifest to monitor here.
version: 2
updates:
  # Third-party actions used in the reusable workflows — keep the SHA pins current.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      github-actions:
        patterns: ["*"]

  # Base OS image in the base toolbox Dockerfile (FROM python:3.12-slim-bookworm@sha256:…).
  # Domain images (mcp-review, …) build FROM our own security-toolbox-base, so their
  # only upstream OS-image dependency lives in toolbox/base.
  - package-ecosystem: docker
    directory: /toolbox/base
    schedule:
      interval: weekly
