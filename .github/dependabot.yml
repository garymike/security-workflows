# Dependabot keeps our pinned supply chain current.
# Scope note: the toolbox's Python tools (pip-audit, snyk-agent-scan) are pinned
# inline via Dockerfile ARGs + toolbox/tools.lock and tracked by
# scripts/check-tool-updates.sh, so there is no pip manifest to monitor here.
version: 2
updates:
  # Third-party actions used in the reusable workflows — keep the SHA pins current.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
    groups:
      github-actions:
        patterns: ["*"]

  # Base OS image in the base toolbox Dockerfile (FROM python:3.12-slim-bookworm@sha256:…).
  # Domain images (mcp-review, …) build FROM our own security-toolbox-base, so their
  # only upstream OS-image dependency lives in toolbox/base.
  - package-ecosystem: docker
    directory: /toolbox/base
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
    ignore:
      # Hold Python at 3.12. yara-python (pulled in by SkillSpector) has no wheel
      # for 3.13 or 3.14 yet, and the slim image ships no C toolchain to build it
      # from source, so a minor or major bump breaks the skill-audit image build.
      # Patch updates (3.12.x) still flow. Revisit when a wheel lands upstream.
      - dependency-name: "python"
        update-types:
          - version-update:semver-minor
          - version-update:semver-major

  # gha-toolbox's downloader stage also pins the python base image.
  - package-ecosystem: docker
    directory: /toolbox/gha
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
    ignore:
      # Keep the gha downloader stage on the same Python as the base image (3.12)
      # so the whole toolbox builds on one runtime. Patch updates still flow.
      - dependency-name: "python"
        update-types:
          - version-update:semver-minor
          - version-update:semver-major
