# Declare the intended visibility and purpose of this repo.
# The github-security-audit skill checks this against actual GitHub settings
# and flags any mismatch as a finding.
#
# visibility: public | private
# purpose: free-text description of what this repo is for

visibility: public
purpose: >
  A security-engineering platform: reusable GitHub Actions workflows
  (security-scan, security-audit, gha-security, skill-audit) over a layered set of
  signed, pinned scanner toolbox images (security-toolbox-base + mcp-review, gha,
  skill-audit). A best-in-class aggregator of upstream security tools; source of
  truth for secret / dependency / GitHub-Actions / skill scanning across garymike repos.
