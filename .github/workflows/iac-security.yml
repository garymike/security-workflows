name: IaC security (reusable)

# Infrastructure-as-Code / misconfiguration scanning with the pinned iac-toolbox image
# (Checkov). Emits SARIF and uploads it to GitHub code scanning.

on:
  workflow_call:
    inputs:
      path:
        description: 'Path to scan (default: repo root)'
        type: string
        default: '.'
      framework:
        description: 'Checkov frameworks (comma-separated) or "all"'
        type: string
        default: 'all'
      fail-on-findings:
        description: 'Fail the job on Checkov findings (false = warn only)'
        type: boolean
        default: false
      upload-sarif:
        description: 'Upload results to GitHub code scanning'
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  iac-security:
    name: IaC security (Checkov)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read          # pull the pinned scanner image from GHCR
      security-events: write   # upload SARIF to code scanning
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Log in to GHCR (to pull the pinned image)
        env:
          ACTOR: ${{ github.actor }}
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: echo "$TOKEN" | docker login ghcr.io -u "$ACTOR" --password-stdin

      - name: Checkov scan
        id: checkov
        env:
          IMAGE: ghcr.io/garymike/security-workflows/iac-toolbox:latest
          SCAN_PATH: ${{ inputs.path }}
          FRAMEWORK: ${{ inputs.framework }}
        run: |
          set -uo pipefail
          docker pull "$IMAGE"
          mkdir -p out && chmod 777 out
          rc=0
          # Checkov's stdout isn't clean SARIF (it prints a banner), so write to a file via
          # --output-file-path. chmod 777 lets the container's unprivileged user write there.
          docker run --rm -v "$PWD:/src:ro" -v "$PWD/out:/out" -w /src "$IMAGE" \
            checkov -d "/src/$SCAN_PATH" --framework "$FRAMEWORK" --compact --quiet --output sarif --output-file-path /out || rc=$?
          sarif=false; [ -s out/results_sarif.sarif ] && sarif=true
          echo "rc=$rc" >> "$GITHUB_OUTPUT"
          echo "sarif=$sarif" >> "$GITHUB_OUTPUT"
          echo "checkov finished (rc=$rc; non-zero = findings)"

      - name: Upload SARIF to code scanning
        if: ${{ inputs.upload-sarif && steps.checkov.outputs.sarif == 'true' }}
        uses: github/codeql-action/upload-sarif@f58f0d11ebf5dedd870fab2f999275f7602cfa46 # codeql-bundle-v2.26.0
        with:
          sarif_file: out/results_sarif.sarif
          category: checkov

      - name: Enforce fail-on-findings
        if: ${{ inputs.fail-on-findings && steps.checkov.outputs.rc != '0' }}
        run: |
          echo "::error::Checkov reported findings (fail-on-findings=true)."
          exit 1
