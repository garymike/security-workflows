name: Security scan (reusable)

on:
  workflow_call:
    inputs:
      fail-on-findings:
        description: 'Fail the workflow if secrets are detected (false = warn only)'
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  secrets:
    name: Secret scanning (betterleaks)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read   # pull the pinned scanner image from GHCR
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Log in to GHCR (to pull the pinned image)
        env:
          ACTOR: ${{ github.actor }}
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: echo "$TOKEN" | docker login ghcr.io -u "$ACTOR" --password-stdin

      - name: Secret scan via the pinned toolbox image
        env:
          IMAGE: ghcr.io/garymike/security-workflows/security-toolbox-base:latest
          FAIL: ${{ inputs.fail-on-findings }}
        run: |
          set -uo pipefail
          docker pull "$IMAGE"
          if docker run --rm -v "$PWD:/src:ro" -w /src "$IMAGE" betterleaks dir /src --no-banner --redact; then
            echo "betterleaks: no secrets found."
          else
            echo "::error::betterleaks reported potential secrets."
            if [ "$FAIL" = "true" ]; then exit 1; fi
            echo "::warning::continuing (fail-on-findings=false)."
          fi

  action-pinning:
    name: Check action version pinning
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Detect unpinned actions
        run: |
          UNPINNED=0
          while IFS= read -r file; do
            while IFS= read -r line; do
              if echo "$line" | grep -qE '^\s+uses:\s+\S+@(v[0-9]|main|master|latest)'; then
                echo "::warning file=$file::Unpinned action: $(echo "$line" | xargs)"
                UNPINNED=$((UNPINNED + 1))
              fi
            done < "$file"
          done < <(find .github/workflows -name '*.yml' -o -name '*.yaml' 2>/dev/null)
          if [ "$UNPINNED" -gt 0 ]; then
            echo "::warning::$UNPINNED unpinned action(s) found. Pin to a full commit SHA for supply-chain safety."
          else
            echo "All actions are pinned or no workflows found."
          fi

  security-md:
    name: Check SECURITY.md
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Check SECURITY.md exists
        run: |
          if [ -f SECURITY.md ] || [ -f .github/SECURITY.md ]; then
            echo "SECURITY.md found."
          else
            echo "::warning::SECURITY.md is missing. Add one to define your vulnerability disclosure process."
          fi
