name: Security audit (reusable)

on:
  workflow_call:

permissions:
  contents: read

jobs:
  audit:
    name: Repository security settings
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Check Dependabot alerts
        run: |
          STATUS=$(gh api "repos/$GITHUB_REPOSITORY/vulnerability-alerts" -i 2>&1 | head -1)
          if echo "$STATUS" | grep -q "204"; then
            echo "Dependabot alerts: enabled"
          else
            echo "::warning::Dependabot alerts are disabled — enable at: https://github.com/$GITHUB_REPOSITORY/settings/security_analysis"
          fi

      - name: Check Dependabot auto-fix
        run: |
          STATUS=$(gh api "repos/$GITHUB_REPOSITORY/automated-security-fixes" -i 2>&1 | head -1)
          if echo "$STATUS" | grep -q "204"; then
            echo "Dependabot auto-fix: enabled"
          else
            echo "::warning::Dependabot automated security fixes are disabled"
          fi

      - name: Check Actions default permissions
        run: |
          PERMS=$(gh api "repos/$GITHUB_REPOSITORY/actions/permissions/workflow" --jq '.default_workflow_permissions' 2>/dev/null || true)
          if [ "$PERMS" = "read" ]; then
            echo "Actions default permissions: read-only"
          else
            echo "::warning::Actions permissions are '$PERMS' — recommend 'read' at: https://github.com/$GITHUB_REPOSITORY/settings/actions"
          fi

      - name: Check delete-branch-on-merge
        run: |
          DBM=$(gh api "repos/$GITHUB_REPOSITORY" --jq '.delete_branch_on_merge' 2>/dev/null || true)
          if [ "$DBM" = "true" ]; then
            echo "Delete branch on merge: enabled"
          else
            echo "::warning::Delete-branch-on-merge is disabled — enable at: https://github.com/$GITHUB_REPOSITORY/settings"
          fi

      - name: Check branch protection
        run: |
          BRANCH=$(gh api "repos/$GITHUB_REPOSITORY" --jq '.default_branch' 2>/dev/null || true)
          HTTP=$(gh api "repos/$GITHUB_REPOSITORY/branches/$BRANCH/protection" -i 2>&1 | head -1)
          if echo "$HTTP" | grep -q "200"; then
            echo "Branch protection: configured on '$BRANCH'"
          elif echo "$HTTP" | grep -q "403"; then
            echo "::notice::Branch protection requires GitHub Pro for private repositories"
          else
            echo "::warning::No branch protection on '$BRANCH' — configure at: https://github.com/$GITHUB_REPOSITORY/settings/branches"
          fi

      - name: Check SECURITY.md
        run: |
          if [ -f SECURITY.md ] || [ -f .github/SECURITY.md ]; then
            echo "SECURITY.md: present"
          else
            echo "::warning::SECURITY.md is missing — add one to define your vulnerability disclosure process"
          fi

      - name: Check visibility intent vs actual
        run: |
          ACTUAL=$(gh api "repos/$GITHUB_REPOSITORY" --jq '.visibility' 2>/dev/null || true)
          METADATA=".github/repo-metadata.yml"
          if [ ! -f "$METADATA" ]; then
            echo "::warning::$METADATA is missing — add it to declare intended visibility (public/private) for audit tracking"
          else
            INTENDED=$(grep -E '^visibility:' "$METADATA" | awk '{print $2}' | tr -d '"' | tr -d "'")
            if [ -z "$INTENDED" ]; then
              echo "::warning::$METADATA exists but 'visibility:' field is not set"
            elif [ "$INTENDED" = "$ACTUAL" ]; then
              echo "Visibility intent: declared '$INTENDED', actual '$ACTUAL' — match"
            else
              echo "::error::Visibility mismatch — $METADATA declares '$INTENDED' but repo is '$ACTUAL'. Confirm this is intentional and update $METADATA if so."
            fi
          fi
