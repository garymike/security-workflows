name: Dogfood scan

# Builds the toolbox from source (validating the layered Dockerfiles) and runs its
# own scanners against this repository. Proves the toolbox works on our own code.

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '0 7 * * 1'   # weekly Monday 07:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scan:
    name: Build toolbox and scan this repo
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Build base image (validates toolbox/base/Dockerfile)
        run: docker build -t security-toolbox-base:ci ./toolbox/base

      - name: Build mcp-review on the local base (validates the layering)
        run: docker build --build-arg BASE=security-toolbox-base:ci -t mcp-review-toolbox:ci ./toolbox/mcp-review

      - name: Self-test (tool versions)
        run: docker run --rm mcp-review-toolbox:ci

      - name: Secret scan (betterleaks) — fails on findings
        run: docker run --rm -v "$PWD:/src:ro" -w /src mcp-review-toolbox:ci betterleaks dir /src --no-banner --redact

      - name: Dependency scan (osv-scanner)
        continue-on-error: true
        run: docker run --rm -v "$PWD:/src:ro" -w /src mcp-review-toolbox:ci osv-scanner scan --recursive /src

      - name: Generate SBOM (syft)
        run: docker run --rm -v "$PWD:/src:ro" -w /src mcp-review-toolbox:ci syft dir:/src -o spdx-json > sbom.spdx.json

      - name: Build gha-toolbox on the local base (validates toolbox/gha/Dockerfile)
        run: docker build --build-arg BASE=security-toolbox-base:ci -t gha-toolbox:ci ./toolbox/gha

      - name: gha-toolbox self-test (tool versions)
        run: docker run --rm gha-toolbox:ci

      - name: GHA lint (actionlint) — informational
        continue-on-error: true
        run: docker run --rm -v "$PWD:/src:ro" -w /src gha-toolbox:ci actionlint -color

      - name: GHA security audit (zizmor, offline) — informational
        continue-on-error: true
        run: docker run --rm -v "$PWD:/src:ro" -w /src gha-toolbox:ci zizmor --offline .

      - name: Build skill-audit-toolbox on the local base (validates toolbox/skill-audit/Dockerfile)
        run: docker build --build-arg BASE=security-toolbox-base:ci -t skill-audit-toolbox:ci ./toolbox/skill-audit

      - name: skill-audit-toolbox self-test (tool versions)
        run: docker run --rm skill-audit-toolbox:ci

      - name: Skill test-file gate on this repo — informational
        continue-on-error: true
        run: docker run --rm -v "$PWD:/src:ro" -w /src skill-audit-toolbox:ci skill-testfile-gate /src

      - name: Image CVE scan (Trivy on the base) — informational
        continue-on-error: true
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: security-toolbox-base:ci
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Build sast-toolbox on the local base (validates toolbox/sast/Dockerfile)
        run: docker build --build-arg BASE=security-toolbox-base:ci -t sast-toolbox:ci ./toolbox/sast

      - name: sast-toolbox self-test (tool version)
        run: docker run --rm sast-toolbox:ci

      - name: SAST (Semgrep) on this repo — informational
        continue-on-error: true
        run: docker run --rm -v "$PWD:/src:ro" -w /src sast-toolbox:ci semgrep scan --config p/default /src --metrics=off

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sbom
          path: sbom.spdx.json
