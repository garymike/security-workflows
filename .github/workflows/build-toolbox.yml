name: Build toolbox image

on:
  push:
    branches: [main]
    paths:
      - 'toolbox/**'
      - 'actions/mcp-review-toolbox/**'
      - '.github/workflows/build-toolbox.yml'
  schedule:
    - cron: '0 6 * * 1'   # weekly Monday 06:00 UTC — rebuild to pick up base-image patches
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build, sign, and push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # push image to GHCR
      id-token: write   # cosign keyless signing + build provenance
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Report tool version drift (non-blocking)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash scripts/check-tool-updates.sh || true

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - uses: docker/login-action@c99871dec2022cc055c062a10cc1a1310835ceb4 # v4.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: prep
        run: |
          IMAGE="ghcr.io/${GITHUB_REPOSITORY,,}/mcp-review-toolbox"
          {
            echo "image=$IMAGE"
            echo "tags<<EOF"
            echo "$IMAGE:latest"
            echo "$IMAGE:sha-${GITHUB_SHA::12}"
            echo "$IMAGE:$(date -u +%Y%m%d)"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: ./toolbox
          push: true
          tags: ${{ steps.prep.outputs.tags }}
          sbom: true
          provenance: mode=max

      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign image (keyless, Sigstore/OIDC)
        env:
          IMAGE: ${{ steps.prep.outputs.image }}
          DIGEST: ${{ steps.build.outputs.digest }}
        run: cosign sign --yes "${IMAGE}@${DIGEST}"
