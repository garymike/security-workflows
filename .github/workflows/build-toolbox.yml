name: Build toolbox images

on:
  push:
    branches: [main]
    paths:
      - 'toolbox/**'
      - '.github/workflows/build-toolbox.yml'
  schedule:
    - cron: '0 6 * * 1'   # weekly Monday 06:00 UTC — rebuild to pick up base-image patches
  workflow_dispatch:

permissions:
  contents: read

jobs:
  base:
    name: Build, sign, push — security-toolbox-base
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # push image to GHCR
      id-token: write   # cosign keyless signing + build provenance
    outputs:
      image: ${{ steps.prep.outputs.image }}
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Report tool version drift (non-blocking)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash scripts/check-tool-updates.sh || true

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: prep
        run: |
          IMAGE="ghcr.io/${GITHUB_REPOSITORY,,}/security-toolbox-base"
          {
            echo "image=$IMAGE"
            echo "tags<<EOF"
            echo "$IMAGE:latest"
            echo "$IMAGE:sha-${GITHUB_SHA::12}"
            echo "$IMAGE:$(date -u +%Y%m%d)"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build for CVE scan (local, no push)
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: ./toolbox/base
          load: true
          tags: security-toolbox-base:scan

      - name: Scan image for fixable CRITICAL CVEs (Trivy) — publish gate
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: security-toolbox-base:scan
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: '1'

      - name: Build and push
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: ./toolbox/base
          push: true
          tags: ${{ steps.prep.outputs.tags }}
          sbom: true
          provenance: mode=max

      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign image (keyless, Sigstore/OIDC)
        env:
          IMAGE: ${{ steps.prep.outputs.image }}
          DIGEST: ${{ steps.build.outputs.digest }}
        run: cosign sign --yes "${IMAGE}@${DIGEST}"

  domain:
    name: Build, sign, push — ${{ matrix.image }}
    needs: base
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: mcp-review-toolbox
            context: ./toolbox/mcp-review
          - image: gha-toolbox
            context: ./toolbox/gha
          - image: skill-audit-toolbox
            context: ./toolbox/skill-audit
          - image: sast-toolbox
            context: ./toolbox/sast
          - image: iac-toolbox
            context: ./toolbox/iac
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: prep
        run: |
          IMAGE="ghcr.io/${GITHUB_REPOSITORY,,}/${{ matrix.image }}"
          {
            echo "image=$IMAGE"
            echo "tags<<EOF"
            echo "$IMAGE:latest"
            echo "$IMAGE:sha-${GITHUB_SHA::12}"
            echo "$IMAGE:$(date -u +%Y%m%d)"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build for CVE scan (local, no push)
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: ${{ matrix.context }}
          load: true
          build-args: |
            BASE=${{ needs.base.outputs.image }}@${{ needs.base.outputs.digest }}
          tags: ${{ matrix.image }}:scan

      - name: Scan image for fixable CRITICAL CVEs (Trivy) — publish gate
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ matrix.image }}:scan
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: '1'

      - name: Build and push (pinned to the signed base by digest)
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: ${{ matrix.context }}
          push: true
          build-args: |
            BASE=${{ needs.base.outputs.image }}@${{ needs.base.outputs.digest }}
          tags: ${{ steps.prep.outputs.tags }}
          sbom: true
          provenance: mode=max

      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign image (keyless, Sigstore/OIDC)
        env:
          IMAGE: ${{ steps.prep.outputs.image }}
          DIGEST: ${{ steps.build.outputs.digest }}
        run: cosign sign --yes "${IMAGE}@${DIGEST}"
