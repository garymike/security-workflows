name: CodeQL (reusable)

# Deep, whole-program SAST via GitHub CodeQL — the complementary engine to Semgrep
# (sast.yml). Free for public repos; private repos need GitHub Advanced Security.
#
# For most public repos, GitHub's code-scanning "default setup" (Settings → Code security
# → Code scanning) is simpler and auto-maintained. Use this reusable workflow when you want
# centralized/advanced setup across repos. Set `languages` for reliability; empty attempts
# autodetection.

on:
  workflow_call:
    inputs:
      languages:
        description: 'CodeQL languages, comma-separated (e.g. "python,javascript"). Empty = autodetect.'
        type: string
        default: ''
      build-mode:
        description: 'CodeQL build mode: none | autobuild | manual'
        type: string
        default: 'none'

permissions:
  contents: read

jobs:
  codeql:
    name: CodeQL analyze
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write   # upload results to code scanning
      actions: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@f58f0d11ebf5dedd870fab2f999275f7602cfa46 # codeql-bundle-v2.26.0
        with:
          languages: ${{ inputs.languages }}
          build-mode: ${{ inputs.build-mode }}

      - name: Autobuild
        if: ${{ inputs.build-mode == 'autobuild' }}
        uses: github/codeql-action/autobuild@f58f0d11ebf5dedd870fab2f999275f7602cfa46 # codeql-bundle-v2.26.0

      - name: Analyze
        uses: github/codeql-action/analyze@f58f0d11ebf5dedd870fab2f999275f7602cfa46 # codeql-bundle-v2.26.0
