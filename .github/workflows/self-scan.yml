name: Self scan

# Dogfoods our own REUSABLE workflows against this repo, so that changes to them (parse
# errors, invalid permissions, runtime failures) are caught here on every push/PR — the
# gap that let the v0.4.0/v0.4.1 bugs ship. CodeQL is omitted (this repo has no
# CodeQL-supported languages). These pull the last-published images; the dogfood job builds
# and blocking-lints the images and workflows themselves.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  security-scan:
    permissions:
      contents: read
      packages: read
    uses: ./.github/workflows/security-scan.yml
    with:
      fail-on-findings: true
    secrets: inherit

  gha-security:
    permissions:
      contents: read
      packages: read
    uses: ./.github/workflows/gha-security.yml
    secrets: inherit

  sast:
    permissions:
      contents: read
      packages: read
      security-events: write
    uses: ./.github/workflows/sast.yml
    secrets: inherit

  iac-security:
    permissions:
      contents: read
      packages: read
      security-events: write
    uses: ./.github/workflows/iac-security.yml
    secrets: inherit

  skill-audit:
    permissions:
      contents: read
      packages: read
    uses: ./.github/workflows/skill-audit.yml
    secrets: inherit

  security-audit:
    permissions:
      contents: read
    uses: ./.github/workflows/security-audit.yml
    secrets: inherit
